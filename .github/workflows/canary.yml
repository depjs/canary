name: canary

on:
  schedule:
    - cron: '23 */2 * * *'
  workflow_dispatch:
  repository_dispatch:
    types: [package-release]
  push:
    branches: [main]

permissions:
  contents: read

concurrency:
  group: canary
  cancel-in-progress: false

jobs:
  # Poll the npm registry for new releases of npm / pnpm / yarn / dep and
  # compare against the committed versions.json.
  check:
    runs-on: ubuntu-latest
    outputs:
      changed: ${{ steps.check.outputs.changed }}
      changes: ${{ steps.check.outputs.changes }}
    steps:
      - uses: actions/checkout@v4
      - uses: actions/setup-node@v4
        with:
          node-version: 22
      - id: check
        run: node scripts/check-versions.mjs
      - uses: actions/upload-artifact@v4
        with:
          name: versions
          path: versions.json

  # On schedule, run only when something was released; manual runs, dispatches
  # from other repos, and pushes always run the full matrix.
  canary:
    needs: check
    if: needs.check.outputs.changed == 'true' || github.event_name != 'schedule'
    strategy:
      fail-fast: false
      matrix:
        pm: [npm, pnpm, yarn, dep]
        fixture: [react, next, express, vite, jest]
    runs-on: ubuntu-latest
    env:
      COREPACK_ENABLE_DOWNLOAD_PROMPT: '0'
    steps:
      - uses: actions/checkout@v4
      - uses: actions/setup-node@v4
        with:
          node-version: 22

      - name: Setup npm@latest
        if: matrix.pm == 'npm'
        run: npm install --global npm@latest

      - name: Setup pnpm@latest
        if: matrix.pm == 'pnpm'
        run: npm install --global pnpm@latest

      - name: Setup yarn@latest
        if: matrix.pm == 'yarn'
        run: |
          version="$(npm view @yarnpkg/cli-dist version)"
          corepack enable
          corepack prepare "yarn@$version" --activate

      - name: Setup dep@latest
        if: matrix.pm == 'dep'
        uses: depjs/setup-depjs@v1

      - name: Install ${{ matrix.fixture }} with ${{ matrix.pm }}
        env:
          RESULT_FILE: ${{ runner.temp }}/result.json
        run: bash scripts/canary.sh '${{ matrix.pm }}' '${{ matrix.fixture }}'

      - uses: actions/upload-artifact@v4
        if: always()
        with:
          name: result-${{ matrix.pm }}-${{ matrix.fixture }}
          path: ${{ runner.temp }}/result.json
          if-no-files-found: ignore

  # Render the comparison table into the job summary AND into the README's
  # "Latest results" section, then commit. The same commit advances
  # versions.json — but only when the whole matrix passed, so a failing
  # release keeps getting retried (and keeps failing loudly) until fixed.
  publish:
    needs: [check, canary]
    if: ${{ !cancelled() && needs.canary.result != 'skipped' }}
    runs-on: ubuntu-latest
    permissions:
      contents: write
    steps:
      - uses: actions/checkout@v4
      - uses: actions/setup-node@v4
        with:
          node-version: 22
      - uses: actions/download-artifact@v4
        with:
          pattern: result-*
          path: results
      - name: Update README with latest results
        run: node scripts/report.mjs results --readme
      - name: Fetch new versions.json
        if: needs.check.outputs.changed == 'true' && needs.canary.result == 'success'
        uses: actions/download-artifact@v4
        with:
          name: versions
      - name: Commit results
        env:
          CHANGES: ${{ needs.check.outputs.changes }}
        run: |
          git add README.md versions.json
          if git diff --cached --quiet; then
            echo "nothing to publish"
            exit 0
          fi
          git config user.name 'github-actions[bot]'
          git config user.email '41898282+github-actions[bot]@users.noreply.github.com'
          git commit -m "chore: update canary results${CHANGES:+ ($CHANGES)}"
          git push
